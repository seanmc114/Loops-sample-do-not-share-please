<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loops — Build a Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #152a63;
      --paper: #f2f4fa;
      --card: #ffffff;
      --line: #d7deee;
      --coral: #2f5aa8;
      --gold: #b8862f;
      --muted: #4a5578;
    }
    html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: 'Nunito', sans-serif; }
    body { display: flex; flex-direction: column; }
    .hdr { background: var(--ink); color: white; padding: 16px 20px; font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; }
    .tabs { display: flex; background: var(--card); border-bottom: 2px solid var(--line); padding: 0; }
    .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 600; border-bottom: 3px solid transparent; color: var(--muted); }
    .tab.active { color: var(--coral); border-color: var(--coral); }
    .panels { flex: 1; overflow: hidden; }
    .panel { display: none; height: 100%; overflow-y: auto; padding: 24px; }
    .panel.active { display: block; }
    input, textarea { padding: 12px; border: 2px solid var(--line); border-radius: 6px; font-family: inherit; font-size: 1rem; }
    input:focus, textarea:focus { outline: none; border-color: var(--coral); }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    .form-group { margin-bottom: 20px; }
    button { padding: 12px 20px; background: var(--coral); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; }
    button:hover { background: #1e4a8a; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .loop-card { background: var(--card); border: 2px solid var(--line); border-radius: 8px; padding: 18px; margin-bottom: 18px; }
    .loop-header { font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .q-item { background: var(--paper); padding: 12px; border-radius: 6px; margin-bottom: 10px; font-size: 0.9rem; }
    .q-item strong { display: block; margin-bottom: 6px; }
    .q-item small { color: var(--muted); }
    .preview-frame { background: var(--card); border: 2px solid var(--line); border-radius: 8px; padding: 20px; }
    .preview-q { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; }
    .preview-opts { display: flex; flex-direction: column; gap: 10px; }
    .preview-opt { padding: 12px; border: 2px solid var(--line); border-radius: 6px; cursor: pointer; text-align: left; }
    .preview-opt:hover { background: var(--paper); }
    .preview-opt.correct { background: #4caf50; color: white; border-color: #4caf50; }
    .preview-opt.wrong { background: #f44336; color: white; border-color: #f44336; }
    .feedback { margin-top: 16px; padding: 12px; border-radius: 6px; text-align: center; font-weight: 600; display: none; }
    .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
    input[type="file"] { padding: 8px; }
  </style>
</head>
<body>
  <div class="hdr">Loops — Build a Game</div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">1 Basics</div>
    <div class="tab" onclick="switchTab(1)">2 Content</div>
    <div class="tab" onclick="switchTab(2)">3 Preview</div>
    <div class="tab" onclick="switchTab(3)">4 Publish</div>
  </div>

  <div class="panels">
    <!-- BASICS -->
    <div class="panel active">
      <div class="form-group">
        <label>Game Name</label>
        <input type="text" id="gameName" placeholder="e.g., World Capitals">
      </div>
      <div class="form-group">
        <label>Audience</label>
        <select id="audience" style="padding: 12px; border: 2px solid var(--line); border-radius: 6px; font-size: 1rem;">
          <option value="Language">🌍 Language</option>
          <option value="Onboarding">🪪 Onboarding</option>
          <option value="Compliance">🛡️ Compliance</option>
          <option value="Exam Prep">📝 Exam Prep</option>
        </select>
      </div>
      <div class="form-group">
        <label>Background Image (optional)</label>
        <input type="file" id="bgImage" accept="image/*">
      </div>
    </div>

    <!-- CONTENT -->
    <div class="panel">
      <div class="form-group">
        <label>Paste content or write a prompt</label>
        <textarea id="contentInput" style="width: 100%; height: 150px; resize: vertical;" placeholder="E.g., 'World capitals trivia' or paste an article..."></textarea>
      </div>
      <button onclick="parseContent()" id="parseBtn">✦ Sort into loops automatically</button>
      <div id="loopsDisplay" style="margin-top: 20px;"></div>
    </div>

    <!-- PREVIEW -->
    <div class="panel">
      <div id="previewDisplay"></div>
    </div>

    <!-- PUBLISH -->
    <div class="panel">
      <button onclick="publishGame()" id="publishBtn">Publish to Library</button>
      <div id="publishStatus" style="margin-top: 20px;"></div>
    </div>
  </div>

  <script>
    let allLoops = [];
    let backgroundBase64 = null;

    function switchTab(idx) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
      document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
      if (idx === 2) renderPreview();
    }

    function handleBgImage() {
      const file = document.getElementById('bgImage').files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        backgroundBase64 = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('bgImage').addEventListener('change', handleBgImage);

    async function parseContent() {
      const input = document.getElementById('contentInput').value.trim();
      if (!input) {
        alert('Paste content or write a prompt.');
        return;
      }

      const btn = document.getElementById('parseBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      try {
        const res = await fetch('https://dry-credit-f396.seansynge.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'parse', input })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Generation failed');

        allLoops = data.loops || [];
        displayLoops();
        btn.textContent = '✦ Sort into loops automatically';
        btn.disabled = false;
      } catch (err) {
        alert('Error: ' + err.message);
        btn.textContent = '✦ Sort into loops automatically';
        btn.disabled = false;
      }
    }

    function displayLoops() {
      let html = '';
      allLoops.forEach((loop, idx) => {
        html += `
          <div class="loop-card">
            <div class="loop-header">${loop.emoji} ${loop.name}</div>
            <div style="font-size: 0.9rem; color: var(--muted); margin-bottom: 12px;">${loop.questions.length} questions</div>
        `;
        loop.questions.forEach((q, qIdx) => {
          let qDisplay = `<strong>${q.type === 'mc' ? '🔘' : '✎'} ${q.q}</strong>`;
          if (q.type === 'mc') {
            qDisplay += `<small>Options: ${q.options.join(', ')}<br>Answer: ${q.answer}</small>`;
          } else {
            qDisplay += `<small>Answer: ${q.answer}</small>`;
          }
          html += `<div class="q-item">${qDisplay}</div>`;
        });
        html += `</div>`;
      });
      document.getElementById('loopsDisplay').innerHTML = html || '<div class="empty">No loops yet</div>';
    }

    function renderPreview() {
      if (allLoops.length === 0) {
        document.getElementById('previewDisplay').innerHTML = '<div class="empty">Create content first to see preview</div>';
        return;
      }

      const loop = allLoops[0];
      const q = loop.questions[0];
      if (!q) {
        document.getElementById('previewDisplay').innerHTML = '<div class="empty">No questions in first loop</div>';
        return;
      }

      let html = `<div class="preview-frame"><div style="font-size: 0.9rem; color: var(--muted); margin-bottom: 12px;">${loop.emoji} ${loop.name} • Question 1</div>`;
      html += `<div class="preview-q">${q.q}</div>`;

      if (q.type === 'mc') {
        html += '<div class="preview-opts">';
        q.options.forEach(opt => {
          html += `<button class="preview-opt" onclick="checkMCAnswer(this, '${opt}', '${q.answer}')">${opt}</button>`;
        });
        html += '</div>';
      } else {
        html += `<input type="text" id="previewInput" placeholder="Type your answer..." style="width: 100%; margin-top: 12px;">
                 <button onclick="checkTypedAnswer('${q.answer}')" style="width: 100%; margin-top: 10px;">Submit</button>`;
      }

      html += '<div class="feedback" id="previewFeedback"></div></div>';
      document.getElementById('previewDisplay').innerHTML = html;
    }

    function checkMCAnswer(btn, selected, correct) {
      const feedback = document.getElementById('previewFeedback');
      const isCorrect = selected === correct;
      
      document.querySelectorAll('.preview-opt').forEach(b => b.disabled = true);
      btn.className = 'preview-opt ' + (isCorrect ? 'correct' : 'wrong');
      
      feedback.textContent = isCorrect ? '✓ Correct!' : '✗ Try again';
      feedback.style.background = isCorrect ? '#c8e6c9' : '#ffcdd2';
      feedback.style.color = isCorrect ? '#2e7d32' : '#c62828';
      feedback.style.display = 'block';
    }

    function checkTypedAnswer(correct) {
      const input = document.getElementById('previewInput');
      const feedback = document.getElementById('previewFeedback');
      const isCorrect = input.value.toLowerCase().trim() === correct.toLowerCase();
      
      input.disabled = true;
      feedback.textContent = isCorrect ? '✓ Correct!' : '✗ Try again';
      feedback.style.background = isCorrect ? '#c8e6c9' : '#ffcdd2';
      feedback.style.color = isCorrect ? '#2e7d32' : '#c62828';
      feedback.style.display = 'block';
    }

    async function publishGame() {
      const name = document.getElementById('gameName').value.trim();
      const audience = document.getElementById('audience').value;

      if (!name) {
        alert('Enter a game name.');
        return;
      }

      if (allLoops.length === 0) {
        alert('Create content first.');
        return;
      }

      const btn = document.getElementById('publishBtn');
      const status = document.getElementById('publishStatus');
      btn.disabled = true;
      btn.textContent = 'Publishing...';
      status.textContent = '';

      try {
        const res = await fetch('https://dry-credit-f396.seansynge.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'publish',
            gameName: name,
            audience,
            loops: allLoops,
            backgroundBase64
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Publish failed');

        status.innerHTML = `<div style="color: #4caf50; padding: 12px; background: #c8e6c9; border-radius: 6px;">✓ Published! Game is now in the library.</div>`;
        btn.textContent = 'Publish to Library';
      } catch (err) {
        status.innerHTML = `<div style="color: #c62828; padding: 12px; background: #ffcdd2; border-radius: 6px;">✗ Error: ${err.message}</div>`;
        btn.textContent = 'Publish to Library';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
